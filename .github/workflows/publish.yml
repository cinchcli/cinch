name: Publish

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        type: choice
        options: [release, nightly]
        default: release
        required: true
      bump:
        description: 'Version bump (release channel only)'
        type: choice
        options: [patch, minor, major, none]
        default: patch
      dry_run:
        description: 'Build but do not publish'
        type: boolean
        default: false
  # No `schedule:` trigger — nightlies are off. The infrastructure
  # (channel=nightly option, next-version.sh nightly path) is left in place
  # so manual nightlies via workflow_dispatch still work if needed; just
  # re-add `schedule: [cron: '0 1 * * *']` to bring back automatic ones.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      channel: ${{ steps.compute.outputs.channel }}
      dry_run: ${{ steps.compute.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: compute
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CHANNEL="nightly"
            DRY=false
          else
            CHANNEL="${{ inputs.channel }}"
            DRY="${{ inputs.dry_run }}"
          fi
          VERSION=$(./scripts/next-version.sh "$CHANNEL" "${{ inputs.bump || 'patch' }}")
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY" >> "$GITHUB_OUTPUT"
          echo "Will build $CHANNEL/$VERSION (dry_run=$DRY)"

  build-cli:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      # Linux CLI is built with cargo-zigbuild pinned to glibc 2.17 so the
      # binary runs on RHEL 7+/Oracle Linux 7+/Debian 8+. The runner's own
      # glibc (2.39 on ubuntu-24.04) would otherwise leak into DT_VERNEED
      # and break execution on common server distros — e.g. Oracle Linux
      # 9.7 (glibc 2.34) hits `GLIBC_2.39 not found` from a stock build.
      - name: Install Zig (Linux)
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild (Linux)
        if: runner.os == 'Linux'
        run: cargo install --locked cargo-zigbuild
      - name: Bump versions
        shell: bash
        run: ./scripts/bump-versions.sh "${{ needs.prepare.outputs.version }}"
      - name: Build CLI (Linux — zigbuild pinned to glibc 2.17)
        if: runner.os == 'Linux'
        run: cargo zigbuild -p cinch-cli --release --target ${{ matrix.target }}.2.17
      - name: Build CLI (macOS / Windows)
        if: runner.os != 'Linux'
        run: cargo build -p cinch-cli --release --target ${{ matrix.target }}
      - name: Package as tarball (unix)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf cinch-cli-${{ matrix.target }}.tar.gz cinch
          # `cinch self-update` fetches `<asset>.sha256` next to the asset
          # and verifies the download. shasum on macOS, sha256sum on Linux.
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 cinch-cli-${{ matrix.target }}.tar.gz > cinch-cli-${{ matrix.target }}.tar.gz.sha256
          else
            sha256sum cinch-cli-${{ matrix.target }}.tar.gz > cinch-cli-${{ matrix.target }}.tar.gz.sha256
          fi
          mkdir -p ../../../dist-cli
          mv cinch-cli-${{ matrix.target }}.tar.gz ../../../dist-cli/
          mv cinch-cli-${{ matrix.target }}.tar.gz.sha256 ../../../dist-cli/
      - name: Package as zip (windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path cinch.exe -DestinationPath cinch-cli-${{ matrix.target }}.zip
          $hash = (Get-FileHash -Algorithm SHA256 cinch-cli-${{ matrix.target }}.zip).Hash.ToLower()
          # Match Unix `shasum -a 256` output format: "<hex>  <filename>"
          "$hash  cinch-cli-${{ matrix.target }}.zip" | Out-File -Encoding ASCII cinch-cli-${{ matrix.target }}.zip.sha256
          New-Item -ItemType Directory -Force -Path ../../../dist-cli
          Move-Item cinch-cli-${{ matrix.target }}.zip ../../../dist-cli/
          Move-Item cinch-cli-${{ matrix.target }}.zip.sha256 ../../../dist-cli/
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist-cli/

  build-desktop-macos:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            arch_name: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}
      - name: Install frontend deps
        run: cd apps/desktop && pnpm install --frozen-lockfile
      - name: Bump versions
        run: ./scripts/bump-versions.sh "${{ needs.prepare.outputs.version }}"
      - name: Set up Apple cert
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Generate an ephemeral keychain password — value doesn't matter
          # as long as it's consistent across the security calls below.
          KEYCHAIN_PWD=$(openssl rand -hex 16)
          echo "::add-mask::$KEYCHAIN_PWD"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          # `codesign:` in the partition list ACL is load-bearing: without it
          # codesign blocks on a GUI keychain-access prompt that never resolves
          # on a headless runner. See desktop-release.yml (legacy) for the
          # exact incantation we're matching.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          # Keep the keychain unlocked for the full build (default re-locks
          # after a few minutes; a long Tauri build can outrun that).
          security set-keychain-settings -lut 21600 build.keychain
          rm /tmp/cert.p12
      - name: Verify Apple notarization credentials
        timeout-minutes: 2
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if ! xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json >/dev/null; then
            echo "::error::Notarization credentials invalid — check APPLE_ID, APPLE_PASSWORD (must be app-specific), APPLE_TEAM_ID"
            exit 1
          fi
          echo "Notarization credentials verified"
      - name: Build desktop bundle (embedded CLI, signs + notarizes + staples inline)
        # Tauri runs codesign on the binary/app/zip, then submits to notarytool
        # with --wait, then staples — all inside this single step when APPLE_ID,
        # APPLE_PASSWORD, and APPLE_TEAM_ID are present. No follow-up notarize
        # step is needed.
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CINCH_TELEMETRY_KEY: ${{ secrets.CINCH_TELEMETRY_KEY }}
          CINCH_TELEMETRY_URL: ${{ secrets.CINCH_TELEMETRY_URL }}
        run: cd apps/desktop && pnpm tauri build --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.target }}
          # Tauri (invoked from a Cargo workspace) emits bundles into the
          # workspace's top-level `target/`, not the package's local target.
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/macos/*.sig

  # Note: Windows desktop bundle is intentionally not built. The Tauri
  # app is currently macOS-only (clipboard backend, window mgmt, and
  # accessibility hooks all assume AppKit). The Windows CLI ships
  # standalone via the cli-x86_64-pc-windows-msvc artifact instead.

  publish:
    needs: [prepare, build-cli, build-desktop-macos]
    if: needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Flatten artifacts
        run: |
          mkdir -p dist
          # `.sha256` is required for `cinch self-update` to verify the
          # download against the expected checksum.
          find artifacts/ -type f \( -name "*.dmg" -o -name "*.tar.gz" -o -name "*.sig" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} dist/ \;
          ls dist/
      - name: Write version.json
        # Consumed by `cinch self-update` (crates/cli/src/update/manifest.rs)
        # to learn the latest version + publish time without parsing the
        # Tauri updater manifest. Kept separate so the schemas can drift
        # independently.
        run: |
          python3 - "${{ needs.prepare.outputs.version }}" dist/version.json <<'PY'
          import json, sys, time
          version, out = sys.argv[1:]
          with open(out, "w") as f:
              json.dump({"version": version, "published_at": int(time.time())}, f, indent=2)
              f.write("\n")
          PY
          cat dist/version.json
      - name: Generate release notes
        run: |
          ./scripts/generate-release-notes.sh \
            "${{ needs.prepare.outputs.channel }}" \
            "${{ needs.prepare.outputs.version }}" \
            > release-notes.md
          cat release-notes.md
      - name: Build updater manifest
        # Tauri 2 names the updater bundle just `<productName>.app.tar.gz`
        # (no version, no arch); we only ship a single aarch64 desktop so
        # there's no ambiguity inside one release.
        env:
          MACOS_AARCH64_SIG: dist/Cinch.app.tar.gz.sig
        run: ./scripts/make-updater-manifest.sh "${{ needs.prepare.outputs.version }}" "${{ needs.prepare.outputs.channel }}" dist/latest.json release-notes.md
      - name: Bump and commit versions
        run: |
          ./scripts/bump-versions.sh "${{ needs.prepare.outputs.version }}"
          git config user.name 'cinch-release[bot]'
          git config user.email 'cinch-release@users.noreply.github.com'
          git add crates apps
          git commit -m "release: ${{ needs.prepare.outputs.channel }}/${{ needs.prepare.outputs.version }}" || echo "no changes"
          git push origin HEAD:main
      - name: Tag release
        run: |
          TAG="${{ needs.prepare.outputs.channel }}/${{ needs.prepare.outputs.version }}"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.channel }}/${{ needs.prepare.outputs.version }}"
          IS_PRERELEASE=$([ "${{ needs.prepare.outputs.channel }}" = "nightly" ] && echo "--prerelease" || echo "")
          gh release create "$TAG" \
            --title "Cinch ${{ needs.prepare.outputs.version }}" \
            --notes-file release-notes.md \
            $IS_PRERELEASE \
            dist/*
      - name: Update Homebrew Cask (release channel only)
        if: needs.prepare.outputs.channel == 'release'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: ./scripts/update-homebrew-cask.sh "${{ needs.prepare.outputs.version }}" dist/Cinch_${{ needs.prepare.outputs.version }}_aarch64.dmg
      - name: Update Homebrew Formula (release channel only)
        if: needs.prepare.outputs.channel == 'release'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          ./scripts/update-homebrew-formula.sh \
            "${{ needs.prepare.outputs.version }}" \
            dist/cinch-cli-aarch64-apple-darwin.tar.gz \
            dist/cinch-cli-aarch64-unknown-linux-gnu.tar.gz \
            dist/cinch-cli-x86_64-unknown-linux-gnu.tar.gz
